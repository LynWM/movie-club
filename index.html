<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>The Seventh Art Society</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">7AS</div>

            <div class="links">
                <a href="#selection">Selection</a>
                <a href="#search">Search</a>
                <a href="#watchlist">Watchlist</a>
            </div>
        </nav>
    </header>

    <section id="selection">

            <h2>
                <i class="fa-solid fa-clapperboard"></i>
                Selection 27
            </h2>
        

        <div id="current-selection">

            <div class = "movie-card">
                <img src="https://a.ltrbxd.com/resized/film-poster/2/6/5/4/3/9/265439-blade-runner-2049-0-2000-0-3000-crop.jpg?v=86735e0bb8" alt="Blade Runner">
                <h3>Blade Runner 2049</h3>
            </div>

            <div class = "movie-card">
                <img src="https://a.ltrbxd.com/resized/film-poster/3/2/6/2/7/9/326279-lady-bird-0-2000-0-3000-crop.jpg?v=754ff28eb4" alt="Blade Runner">
                <h3>Lady Bird</h3>
            </div>
        </div>

        <div class="meeting-info">
            
            <p>
                <i class="fa-solid fa-calendar-day"></i>
                Meeting Date: April 19, 2026
            </p>

            
            <p>
                <i class="fa-solid fa-clock"></i>
                Meeting Time: 08:30PM 
            </p>
        </div>
    </section>
    <hr>
    <section id="search">
        <h2>Search for Movies</h2>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search movie title...">
            <button id="search-btn">Search</button>
        </div>

        <div id="results-container">
            <!-- Results from search -->
        </div>
    </section>
    <hr>
    <section id="watchlist">
        <h2>Watchlist</h2>

        <div id="watchlist-container">

        </div>
    </section>
    <hr>
    <footer>
        <h3>Our Socials</h3>
        <div class="socials">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-letterboxd"></i>
            <i class="fa-brands fa-whatsapp"></i>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
