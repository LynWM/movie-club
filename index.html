<!DOCTYPE html>

                <ul>
                    <li><a href="#selection">Selection</a></li>
                    <li><a href="#search">Search</a></li>
                    <li><a href="#watchlist">Watchlist</a></li>

    <section id="selection">
        <h2>
                <i class="fa-solid fa-clapperboard"></i>

        <div id="results-container">
